# Blindsight training defaults — extracted verbatim from BLINDSIGHT/Blindsight_TMLR.py.
# See docs/reproduction/deviations.md if any value differs from the paper.

defaults:
  - /maps@_here_      # inherit cascade / first_order / second_order / losses / seed

# Override shared dims for Blindsight (perceptual: 100-d input).
#
# Sprint-08 D.25 RG-002 fixes (2026-04-20) — two config knobs that close the
# headline wager + discrim gap vs paper Table 5a (see
# `docs/reviews/rg002-wager-gap-investigation.md`):
#
#   first_order.hidden_dim = 40    # student `main()` actual value
#                                  # (Table 9 claims 60; code != table)
#   second_order.hidden_dim = 100  # Pasquali & Cleeremans 2010 hidden layer
#                                  # (student passes `hidden_2nd=100` but never
#                                  # instantiates the layer — code bug)
#
# With both fixes: discrim 0.863→0.94, wager 0.666→0.82, vs paper 0.97/0.85.
# See `deviations.md` D-blindsight-hidden-40 and D-blindsight-wager-hidden.
# Overrides for legacy pre-D.25 behaviour:
#   -o first_order.hidden_dim=100      # original port (no bottleneck)
#   -o first_order.hidden_dim=60       # Table 9 literal
#   -o second_order.hidden_dim=0       # student `SecondOrderNetwork` (no hidden)
first_order:
  input_dim: 100
  hidden_dim: 40         # student main() value — NOT Table 9's 60 (RG-002 H5)

second_order:
  hidden_dim: 100        # Pasquali 2010 hidden layer (RG-002 H10)

optimizer:
  name: ADAMAX           # Blindsight_TMLR.py §prepare_pre_training (default)
  lr_first_order: 0.5    # learning_rate_1
  lr_second_order: 0.1   # learning_rate_2

scheduler:
  name: StepLR
  step_size: 25          # stepsize
  gamma: 0.98            # gam

train:
  n_epochs: 200
  batch_size: 100        # patterns per epoch (Blindsight pattern-level)
  noise_level: 0.1       # overridden per-experiment
  data_factor: 1
  momentum: 0.9
  threshold: 0.5

ema_window: 25           # shell-level EMA for reporting
