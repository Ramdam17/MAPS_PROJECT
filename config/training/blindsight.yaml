# Blindsight training defaults — extracted verbatim from BLINDSIGHT/Blindsight_TMLR.py.
# See docs/reproduction/deviations.md if any value differs from the paper.

defaults:
  - /maps@_here_      # inherit cascade / first_order / second_order / losses / seed

# Override shared dims for Blindsight (perceptual: 100-d input).
# Sprint-08 D.25 (2026-04-20): hidden_dim aligned to paper Table 9 row 6
# (Hidden size = 60). Pre-D.25 port had hidden_dim=100 — same as input,
# i.e. NO bottleneck → autoencoder cannot learn a compressed invariant
# representation → plausible root cause of the Blindsight z-score gap
# (port 0.40 vs paper 9.01). Overrides:
#   -o first_order.hidden_dim=100   # legacy pre-D.25 behaviour
# Tracking : deviations.md RG-002 H1 ; smoke validation in progress.
first_order:
  input_dim: 100
  hidden_dim: 60         # paper Table 9 row 6 (D.25, was 100 — RG-002 H1)

optimizer:
  name: ADAMAX           # Blindsight_TMLR.py §prepare_pre_training (default)
  lr_first_order: 0.5    # learning_rate_1
  lr_second_order: 0.1   # learning_rate_2

scheduler:
  name: StepLR
  step_size: 25          # stepsize
  gamma: 0.98            # gam

train:
  n_epochs: 200
  batch_size: 100        # patterns per epoch (Blindsight pattern-level)
  noise_level: 0.1       # overridden per-experiment
  data_factor: 1
  momentum: 0.9
  threshold: 0.5

ema_window: 25           # shell-level EMA for reporting
