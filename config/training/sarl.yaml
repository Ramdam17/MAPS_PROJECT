# SARL (MinAtar DQN) training defaults — paper values from
# external/MinAtar/examples/maps.py:92-107 and the optimizer setup at 1307-1319.
# See docs/reproduction/deviations.md if any value differs from the paper.

defaults:
  - /maps@_here_              # inherit cascade / seed / losses

# ── Environment ─────────────────────────────────────────────────────────────
game: space_invaders          # one of {space_invaders, breakout, seaquest, asterix, freeway}

# ── Paper setting (1-6) — translates to (meta, cascade_1, cascade_2) via
#    training_loop.setting_to_config:
#      1: vanilla DQN (meta=False, cascade=1,1)
#      2: cascade on FO only (meta=False, cascade=50,1)
#      3: meta on, cascade off (meta=True, cascade=1,1)
#      4: meta + cascade on FO (meta=True, cascade=50,1)
#      5: meta + cascade on SO (meta=True, cascade=1,50)
#      6: full MAPS (meta=True, cascade=50,50)
setting: 6

# ── DQN hyperparameters (paper Table 11) ───────────────────────────────────
# Sprint-08 D.9 (2026-04-20): 5 hyperparameters aligned from student values
# to paper-faithful ones. For student-baseline reproduction override with:
#   -o training.batch_size=128 -o optimizer.lr_first_order=0.0003 \
#   -o optimizer.lr_second_order=0.00005 -o optimizer.betas=[0.9,0.999] \
#   -o scheduler.step_size=1000
# See docs/reproduction/deviations.md D-sarl-batch-size / -step-size-1 /
#   -lr-2nd / -adam-beta1/2 / -sched-step.
training:
  num_frames: 5_000_000        # NUM_FRAMES (paper constant; D-sarl-num-frames debate pending D.12)
  batch_size: 32               # BATCH_SIZE — paper Table 11 (student = 32 also; port was 128, fix D.9)
  replay_buffer_size: 100_000  # REPLAY_BUFFER_SIZE
  replay_start_size: 5_000     # REPLAY_START_SIZE
  training_freq: 1             # TRAINING_FREQ (update every frame once warmed up)
  target_update_freq: 1_000    # TARGET_NETWORK_UPDATE_FREQ (paper; student used 100 — D-sarl-target-update resolved port-side)
  # Paper Table 11 prescribes γ=0.999 (effective horizon ~1000 steps). Student
  # sarl_maps.py:104 uses 0.99 (horizon ~100) — a student-vs-paper divergence
  # (D-sarl-gamma). Aligned to paper-faithful 2026-04-20 (Sprint-08 D.7).
  # Override with `--override training.gamma=0.99` to reproduce student baseline.
  gamma: 0.999                 # GAMMA (DQN discount)

# ── Optimizer — paper uses Adam with custom betas (NOT Adamax like blindsight/agl) ──
optimizer:
  name: Adam
  lr_first_order: 0.00025      # step_size1 (paper Table 11; port was 0.0003 typo — D-sarl-step-size-1 resolved D.9)
  lr_second_order: 0.0002      # step_size2 (paper Table 11; port was 0.00005 — D-sarl-lr-2nd resolved D.9)
  eps: 0.01                    # MIN_SQUARED_GRAD (Adam numerical-stability eps)
  # Paper Table 11: betas=(0.95, 0.95). Student omits `betas=...` arg so Adam
  # falls back to PyTorch defaults (0.9, 0.999) — silent divergence from paper
  # (D-sarl-adam-beta1/2). Aligned to paper-faithful 2026-04-20 (Sprint-08 D.9).
  betas: [0.95, 0.95]

# ── Scheduler — StepLR (NOT the Blindsight 25/0.98 schedule) ────────────────
# Paper Table 11: step_size=1 (lr decays every update). Student sarl_maps.py
# uses step_size=1000 (lr decays every 1000 updates). Port previously matched
# student. The paper value is extreme (lr → 0 after ~5k updates for 5M frames)
# and may be a paper typo; _build_optimizers emits a log.warning when
# step_size=1 so the behaviour is discoverable. Override with
# `-o scheduler.step_size=1000` to reproduce student. D-sarl-sched-step
# resolved paper-as-written 2026-04-20 (Sprint-08 D.9).
scheduler:
  name: StepLR
  step_size: 1                 # scheduler_period (paper Table 11)
  gamma: 0.999                 # scheduler_step (paper silent — keep)

# ── EMA for target_wager — paper passes alpha in PERCENT (alpha=45 → 0.45)
# Paper Table 11 specifies α=0.45 (post-division). Student shell default was
# `-ema 25` (→ 0.25), which itself diverged from paper; our prior value of 1.0
# (→ 0.01) diverged from both. Aligned to paper-faithful value 2026-04-20
# (D-sarl-alpha-ema fix, Sprint-08 D.2). To reproduce the student baseline
# instead, override via `--override alpha=25` on the CLI.
alpha: 45

# ── Validation ──────────────────────────────────────────────────────────────
validation:
  every_episodes: 50           # run validation rollouts every N training episodes
  n_episodes: 3                # number of greedy rollouts per validation

# ── Runtime ─────────────────────────────────────────────────────────────────
device: cpu                    # override to "cuda" or "mps" on capable hardware

# ── Seed inherited from maps.yaml (default 42); override via --seed on CLI. ─
