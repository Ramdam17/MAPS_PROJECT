# SARL (MinAtar DQN) training defaults — paper values from
# external/MinAtar/examples/maps.py:92-107 and the optimizer setup at 1307-1319.
# See docs/reproduction/deviations.md if any value differs from the paper.

defaults:
  - /maps@_here_              # inherit cascade / seed / losses

# ── Environment ─────────────────────────────────────────────────────────────
game: space_invaders          # one of {space_invaders, breakout, seaquest, asterix, freeway}

# ── Paper setting (1-6) — translates to (meta, cascade_1, cascade_2) via
#    training_loop.setting_to_config:
#      1: vanilla DQN (meta=False, cascade=1,1)
#      2: cascade on FO only (meta=False, cascade=50,1)
#      3: meta on, cascade off (meta=True, cascade=1,1)
#      4: meta + cascade on FO (meta=True, cascade=50,1)
#      5: meta + cascade on SO (meta=True, cascade=1,50)
#      6: full MAPS (meta=True, cascade=50,50)
setting: 6

# ── DQN hyperparameters (paper constants — do not change without logging) ──
training:
  num_frames: 5_000_000        # NUM_FRAMES (paper constant)
  batch_size: 128              # BATCH_SIZE
  replay_buffer_size: 100_000  # REPLAY_BUFFER_SIZE
  replay_start_size: 5_000     # REPLAY_START_SIZE
  training_freq: 1             # TRAINING_FREQ (update every frame once warmed up)
  target_update_freq: 1_000    # TARGET_NETWORK_UPDATE_FREQ (in update steps, not frames)

# ── Optimizer — paper uses Adam (NOT Adamax like blindsight/agl) ────────────
optimizer:
  name: Adam
  lr_first_order: 0.0003       # step_size1
  lr_second_order: 0.00005     # step_size2
  eps: 0.01                    # MIN_SQUARED_GRAD (Adam numerical-stability eps)

# ── Scheduler — StepLR (NOT the Blindsight 25/0.98 schedule) ────────────────
scheduler:
  name: StepLR
  step_size: 1_000             # scheduler_period
  gamma: 0.999                 # scheduler_step

# ── EMA for target_wager — paper passes alpha in PERCENT (alpha=45 → 0.45)
# Paper Table 11 specifies α=0.45 (post-division). Student shell default was
# `-ema 25` (→ 0.25), which itself diverged from paper; our prior value of 1.0
# (→ 0.01) diverged from both. Aligned to paper-faithful value 2026-04-20
# (D-sarl-alpha-ema fix, Sprint-08 D.2). To reproduce the student baseline
# instead, override via `--override alpha=25` on the CLI.
alpha: 45

# ── Validation ──────────────────────────────────────────────────────────────
validation:
  every_episodes: 50           # run validation rollouts every N training episodes
  n_episodes: 3                # number of greedy rollouts per validation

# ── Runtime ─────────────────────────────────────────────────────────────────
device: cpu                    # override to "cuda" or "mps" on capable hardware

# ── Seed inherited from maps.yaml (default 42); override via --seed on CLI. ─
