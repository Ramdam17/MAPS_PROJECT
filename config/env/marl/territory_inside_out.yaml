# Territory Inside Out (paper §A.4 p. 27).
# Bargaining + dynamic intra-episode learning + delayed rewards + zap-elimination.
# Reward: +1 per claimed resource patch, -penalty on zap (dmlab2d-native) ; no shaping.
# Termination: env truncates at max_cycles ; agents can be zapped out early
# (per-player done), but episode continues until truncation for global done.

id: territory_inside_out
substrate_name: territory__inside_out      # MeltingPot uses double-underscore : <family>__<variant>
                                           # ; bug found at E.17c launch (262127 — 18 territory cells failed)
num_agents: 5                     # paper §A.4
roles: ["default", "default", "default", "default", "default"]
downsample_scale: 8
obs_shape_agent: [11, 11, 3]
episode_length: 1000              # student train_meltingpot.sh (TERRITORY_I=1000)
max_cycles: 1000
