# Filesystem layout.
# Paths are relative to the project root, which is auto-discovered by
# maps.utils.paths.get_paths() (MAPS_ROOT env var > parent of config/ > cwd).
# Override a single path with CLI: --paths.outputs /scratch/me/outputs

data: data
outputs: outputs
models: models
logs: logs
figures: outputs/figures
reports: outputs/reports
# HPC scratch / work area. $SCRATCH env var wins when set (DRAC, SLURM);
# otherwise falls back to `outputs` so dev machines use project-local storage.
scratch_root: outputs
